{% extends 'labapp/base.html' %}
{% block title %}Check Your Email | MI Lab{% endblock %}

{% block content %}
<div style="min-height:60vh; display:flex; align-items:center; justify-content:center; padding:2rem 0;">
  <div style="width:100%; max-width:460px; text-align:center;">

    <div style="display:inline-flex; align-items:center; justify-content:center;
                width:72px; height:72px; background:var(--success-light);
                border-radius:var(--radius-xl); margin-bottom:1.5rem;">
      <i class="fa-solid fa-envelope-circle-check" style="font-size:2rem; color:var(--success);"></i>
    </div>

    <h1 style="font-size:1.75rem; font-weight:800; margin:0 0 .75rem;">Check Your Email</h1>
    <p style="color:var(--text-muted); line-height:1.7; max-width:360px; margin:0 auto 2rem;">
      If an account exists with the address you provided, a password reset link has been sent.
      Please check your inbox and spam folder.
    </p>

    <a href="{% url 'login' %}" class="btn btn-secondary">
      <i class="fa-solid fa-arrow-left me-2"></i>Return to Login
    </a>

  </div>
</div>
{% endblock %}
