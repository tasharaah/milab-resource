{% extends 'labapp/base.html' %}
{% block title %}Sign In | MI Lab{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:2rem 0;">
  <div style="width:100%;max-width:420px;">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;background:var(--primary-light);border-radius:var(--radius-lg);margin-bottom:1rem;">
        <i class="fa-solid fa-brain" style="font-size:1.6rem;color:var(--primary);"></i>
      </div>
      <h1 style="font-size:1.75rem;font-weight:800;margin:0 0 .3rem;letter-spacing:-.02em;">Welcome back</h1>
      <p style="color:var(--text-muted);font-size:.9rem;margin:0;">Sign in to MI Lab Resource Manager</p>
    </div>
    <div class="card">
      <div class="card-body" style="padding:2rem;">
        {% if form and form.non_field_errors %}
          <div class="alert alert-danger mb-4">{{ form.non_field_errors }}</div>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-4">
            <label for="id_username" class="form-label">Username</label>
            <div style="position:relative;">
              <i class="fa-solid fa-user" style="position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.8rem;pointer-events:none;"></i>
              <input type="text" name="username" autofocus class="form-control" placeholder="Enter your username" required id="id_username" style="padding-left:2.4rem;">
            </div>
          </div>
          <div class="mb-5">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem;">
              <label for="id_password" class="form-label" style="margin:0;">Password</label>
              <a href="{% url 'password_reset' %}" style="font-size:.78rem;color:var(--text-muted);font-weight:500;">Forgot password?</a>
            </div>
            <div style="position:relative;">
              <i class="fa-solid fa-lock" style="position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.8rem;pointer-events:none;"></i>
              <input type="password" name="password" class="form-control" placeholder="Enter your password" required id="id_password" style="padding-left:2.4rem;">
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-lg">
            <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
