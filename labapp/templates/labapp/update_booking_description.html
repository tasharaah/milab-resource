{% extends 'labapp/base.html' %}

{% block title %}Update Booking Description | MI Lab{% endblock %}

{% block content %}
<h1 class="mb-4">Update Booking Description</h1>

<form method="post">
  {% csrf_token %}
  <div class="mb-3">
    <label class="form-label">Resource</label>
    <p class="form-control-plaintext">{{ booking.resource.name }}</p>
  </div>
  <div class="mb-3">
    <label class="form-label">Description</label>
    <textarea name="description" class="form-control" rows="3">{{ booking.description }}</textarea>
  </div>
  <button type="submit" class="btn btn-primary">Save</button>
</form>

{% endblock %}
