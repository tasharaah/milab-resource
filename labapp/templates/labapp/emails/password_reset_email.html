<!doctype html>
<html>
  <body style="font-family:Segoe UI,Arial,sans-serif; background:#f7fbff; padding:24px;">
    <div style="max-width:560px;margin:auto;background:#ffffff;border:1px solid #e6eef7;border-radius:16px;padding:22px;">
      <h2 style="margin:0 0 10px;color:#0b2a4a;">Reset your MI Lab password</h2>
      <p style="margin:0 0 12px;color:#6b7a90;">Hi {{ user.get_username }},</p>

      <p style="margin:0 0 16px;color:#0b2a4a;">
        Click the button below to set a new password.
      </p>

      <p style="margin:0 0 18px;">
        <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}"
           style="display:inline-block;background:#2f80ed;color:#fff;text-decoration:none;padding:10px 16px;border-radius:12px;font-weight:700;">
           Reset Password
        </a>
      </p>

      <p style="margin:0;color:#6b7a90;font-size:13px;">
        If you didn’t request this, you can ignore this email.
      </p>
    </div>
  </body>
</html>
