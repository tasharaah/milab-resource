{% extends 'labapp/base.html' %}
{% block title %}Password Reset Complete | MI Lab{% endblock %}

{% block content %}
<div style="min-height:60vh; display:flex; align-items:center; justify-content:center; padding:2rem 0;">
  <div style="width:100%; max-width:460px; text-align:center;">

    <div style="display:inline-flex; align-items:center; justify-content:center;
                width:72px; height:72px; background:var(--success-light);
                border-radius:var(--radius-xl); margin-bottom:1.5rem;">
      <i class="fa-solid fa-shield-check" style="font-size:2rem; color:var(--success);"></i>
    </div>

    <h1 style="font-size:1.75rem; font-weight:800; margin:0 0 .75rem;">Password Updated!</h1>
    <p style="color:var(--text-muted); line-height:1.7; max-width:340px; margin:0 auto 2rem;">
      Your password has been reset successfully. You can now sign in with your new credentials.
    </p>

    <a href="{% url 'login' %}" class="btn btn-primary btn-lg">
      <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
    </a>

  </div>
</div>
{% endblock %}
